# Minimal single-binary Tempo: OTLP in (from the Collector), local filesystem
# storage. For local dev / a starter cluster view — not a production config.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
